<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0a06" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="./manifest.json" />
  <title>Mort dans l'âme</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0608;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
      font-family: Georgia, serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      max-width: 100% !important;
      max-height: 100% !important;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: linear-gradient(180deg, #1a0a06 0%, #2a1408 50%, #1a0a06 100%);
      color: #d4a040;
      z-index: 100;
    }
    #loading .glow {
      font-size: 24px;
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 1; text-shadow: 0 0 20px #d4a040; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="glow">Mort dans l'âme</div>
    <div style="font-size: 11px; opacity: 0.6; margin-top: 12px; font-style: italic;">chargement…</div>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
